# Define stages once at the top
stages:
  - test
  - secret-detection
  # sast stage is provided by the template; it will be added automatically

# Include security templates (they bring their own jobs and stages)
# include:
#   - template: Security/SAST.gitlab-ci.yml
#   - template: Security/Secret-Detection.gitlab-ci.yml

# variables:
#   SECRET_DETECTION_ENABLED: 'true'

default:
  tags:
    - docker
  before_script:
    - apt-get update && apt-get install -y iverilog
    - apt install -y curl
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - source $HOME/.local/bin/env
    - uv sync

# The test job needs iverilog and Python deps; security jobs don't
test:
  stage: test
  script:
    - mkdir ./logs
    - chmod +x ./scripts/score_regr.sh   # ensure it's executable
    - ./scripts/score_regr.sh
  # artifacts:
  #   paths:
  #     - logs/               # if you want to keep simulation logs
  #   when: always

# Security jobs are already provided by the templates – do not redefine them.
# They will run in their respective stages.